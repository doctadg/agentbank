# fly.toml — AgentBank backend
# Deploy with: fly deploy
# First-time:  fly launch --no-deploy (then edit) -> fly volumes create data --size 1 --region <region> -> fly deploy

app = "agentbank-api"
primary_region = "iad"   # change to your preferred region (e.g. "fra", "sin", "ord")

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DB_PATH = "/data/agentbank.db"

# Persistent SQLite database
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
